<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TA Signals — Kronos</title>
<style>
  :root { --bg:#f8fafc; --card:#ffffff; --ink:#0f172a; --mut:#64748b; --line:#e2e8f0;
          --up:#16a34a; --dn:#dc2626; --neu:#94a3b8; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  header { padding:16px 18px 10px; border-bottom:1px solid var(--line); background:#fff; position:sticky; top:0; z-index:5; }
  .top { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  h1 { font-size:19px; margin:0; font-weight:700; }
  .back { font-size:13px; color:#2563eb; text-decoration:none; }
  .back:hover { text-decoration:underline; }
  .sub { color:var(--mut); font-size:12px; margin-top:4px; }
  #status { color:var(--mut); font-size:12px; }
  .warn { margin:10px 18px 0; padding:8px 12px; background:#fef9c3; border:1px solid #fde047;
          border-radius:8px; font-size:12px; color:#854d0e; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; padding:16px 18px 40px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 14px 8px;
          box-shadow:0 1px 2px rgba(15,23,42,.04); }
  .chead { display:flex; align-items:center; justify-content:space-between; }
  .sym { font-size:16px; font-weight:700; }
  .bias { font-size:12px; font-weight:700; padding:3px 9px; border-radius:999px; }
  .b-long { background:#dcfce7; color:#166534; }
  .b-short { background:#fee2e2; color:#991b1b; }
  .b-neu { background:#f1f5f9; color:#475569; }
  .sub2 { color:var(--mut); font-size:11px; margin:3px 0 10px; }
  .row { display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px;
         padding:6px 0; border-top:1px solid #f1f5f9; }
  .iname { font-size:13px; font-weight:600; color:#334155; }
  .fam { font-size:10px; font-weight:400; color:#94a3b8; margin-left:7px; }
  .ar { font-size:15px; letter-spacing:1px; font-variant-numeric:tabular-nums; text-align:right; min-width:42px; }
  .up { color:var(--up); } .dn { color:var(--dn); } .nu { color:var(--neu); }
  .det { grid-column:1 / -1; font-size:10.5px; color:#94a3b8; margin-top:-3px; }
  .empty { padding:30px 18px; color:var(--mut); font-size:14px; }
  @media (max-width:560px){ .grid { grid-template-columns:1fr; padding:12px; } }
</style>
</head>
<body>
<header>
  <div class="top">
    <h1>TA Signals</h1>
    <a class="back" href="/">← Dashboard</a>
    <span id="status">connecting…</span>
  </div>
  <div class="sub">Ten classic indicators per symbol · ▲ long, ▼ short (more = stronger), — neutral · 5-minute bars</div>
</header>
<div class="warn">Read-only indicator board. These are weak, noisy features — <b>not trade signals</b> — and are <b>not</b> wired into the bot. Use as situational context only.</div>
<div class="grid" id="cards"><div class="empty">Loading…</div></div>

<script>
const POLL = 15000;

function arrows(sig){
  if (sig.dir === 'long')  return '<span class="up">' + '▲'.repeat(sig.strength) + '</span>';
  if (sig.dir === 'short') return '<span class="dn">' + '▼'.repeat(sig.strength) + '</span>';
  return '<span class="nu">—</span>';
}

function render(d){
  const ta = d.ta_signals || {};
  const syms = Object.keys(ta).sort();
  const root = document.getElementById('cards');
  if (!syms.length){
    root.innerHTML = '<div class="empty">No signals yet — the dashboard server is warming its candle cache (needs ~60 bars per symbol). Give it a minute and reload.</div>';
    return;
  }
  root.innerHTML = syms.map(sym => {
    const t = ta[sym];
    const cls = t.bias === 'LONG' ? 'b-long' : t.bias === 'SHORT' ? 'b-short' : 'b-neu';
    const net = (t.net > 0 ? '+' : '') + t.net;
    const rows = t.signals.map(s =>
      `<div class="row"><div class="iname">${s.name}<span class="fam">${s.family}</span></div>`
      + `<div class="ar">${arrows(s)}</div>`
      + `<div class="det">${s.detail}</div></div>`).join('');
    return `<div class="card">
      <div class="chead"><span class="sym">${sym}</span><span class="bias ${cls}">${t.bias} ${net}</span></div>
      <div class="sub2">${t.longs} long · ${t.shorts} short · ${t.tf} · ${t.bars} bars</div>
      ${rows}
    </div>`;
  }).join('');
}

async function poll(){
  const st = document.getElementById('status');
  try {
    const r = await fetch('/data?t=' + Date.now(), { cache:'no-store' });
    const d = await r.json();
    render(d);
    st.textContent = 'updated ' + (d.ts || '') + ' · refreshes every ' + (POLL/1000) + 's';
  } catch (e) {
    st.textContent = 'connection lost — retrying';
  }
}
poll();
setInterval(poll, POLL);
</script>
</body>
</html>
